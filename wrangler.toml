name = "relay"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[durable_objects]
bindings = [
  { name = "RELAY_HUB", class_name = "RelayHub" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WebSocketPool"]

[[migrations]]
tag = "v2"
renamed_classes = [{from = "WebSocketPool", to = "RelayHub"}]
